apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-ui-deployment
  namespace: sales-test-ns
  labels:
    app: sales-ui 
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: sales-ui
  template:
    metadata:
      labels:
        app: sales-ui
    spec:
      containers:
        - name: sales-ui-container
          image: kubectlandchill/sales-invoice-ui:v1.1.3
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "720Mi"
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: backend-config