apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sales-hpa
  namespace: sales-test-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sales-ui-deployment
  minReplicas: 2
  maxReplicas: 6
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50