apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: sales-test-ns
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
 
  selector:
    matchLabels:
      app: rabbitmq
 
  template:
    metadata:
      labels:
        app: rabbitmq
 
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
 
          ports:
            - containerPort: 5672
            - containerPort: 15672
 
          envFrom:
            - secretRef:
                name: rabbitmq-secret
 
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
 
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        storageClassName: sales-storageclass
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: 5Gi