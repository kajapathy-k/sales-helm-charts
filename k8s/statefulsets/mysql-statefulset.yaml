apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-db
  namespace: sales-test-ns
  labels:
    app: mysql
spec:
  serviceName: mysql-db
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: mysql:8.4

          ports:
            - containerPort: 3306

          envFrom:
            - secretRef:
                name: mysql-secret

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      storageClassName: sales-storageclass
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 5Gi