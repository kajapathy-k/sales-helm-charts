apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: customer-route
  namespace: sales-test-ns 
spec:
  parentRefs:
  - name: sales-gateway
    namespace: sales-test-ns
  rules:
  - matches:
    - path: 
        type: PathPrefix
        value: /api/customers
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /customers
    backendRefs:
    - name: customer-service
      port: 3000