apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: {{ .Values.routes.payments.routeName }}
    namespace: {{ .Values.namespaces.application }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.gatewayName }}
    namespace: {{ .Values.namespaces.gateway }}
  rules:
  - matches:
    - path: 
        type: PathPrefix
        value: {{ .Values.routes.payments.path }}
    backendRefs:
    - name: {{ .Values.routes.payments.service }}
      port: {{ .Values.routes.payments.port }}

