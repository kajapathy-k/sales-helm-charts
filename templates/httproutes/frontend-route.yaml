apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.ui.routeName }}
  namespace: {{ .Values.namespaces.application }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.gatewayName }}
    namespace: {{ .Values.namespaces.gateway }}
  rules:
  - matches:
    - path: 
        type: PathPrefix
        value: {{ .Values.routes.ui.path }}
    backendRefs:
    - name: {{ .Values.routes.ui.service }}
      port: {{ .Values.routes.ui.port }}