global:
  environment: dev
  imagePullPolicy: IfNotPresent

namespaces:
  application: sales-test-ns
  gateway: sales-gateway-ns

# ---------------- CONFIGMAPS ----------------

configmaps:
  backend:
    name: backend-config
    data:
      CUSTOMER_SERVICE_URL: http://customer-service:3000
      ORDER_SERVICE_URL: http://order-service:3000
      INVOICE_SERVICE_URL: http://invoice-service:3000
      PAYMENT_SERVICE_URL: http://payment-service:3000

  frontend:
    name: frontend-config
    data:
      NEXT_PUBLIC_API_URL: /api/v1


# ---------------- SECRETS ----------------

secrets:

  backend:
    name: backend-secret
    data:
      DATABASE_URL: mysql+pymysql://salesuser:salespassword@mysql-db:3306/sales_db
      JWT_SECRET_KEY: djnjenjnejnjdennekwnkndekwnkjndejkwnjkdnekwjndjkwnekjdnekjwndkjnwekndkwenkjdnwekjncdjnjnjdn
      ENVIRONMENT: production
      ACCESS_TOKEN_EXPIRE_MINUTES: "360"
      RABBITMQ_URL: amqp://salesuser:salespassword@rabbitmq:5672/
      API_URL: /api/v1

    mysql:
      name: mysql-secret
      data:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: sales_db
        MYSQL_USER: salesuser
        MYSQL_PASSWORD: salespassword

    rabbitmq:
      name: rabbitmq-secret
      data:
        RABBITMQ_DEFAULT_USER: salesuser
        RABBITMQ_DEFAULT_PASS: salespassword

# ---------------- SERVICES ----------------

auth:
  name: auth-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/auth-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

customer:
  name: customers-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/customer-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

order:
  name: order-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/order-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

invoice:
  name: invoice-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/invoice-service
    tag: v1.1.0
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

payment:
  name: payment-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/payment-service
    tag: v1.1.0
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

notifications:
  name: notification-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/sales-notification-service
    tag: v1.0.1

salesUi:
  name: sales-ui-deployment
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/sales-invoice-ui
    tag: v1.1.4
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "250m"
      memory: "720Mi"

# ---------------- HPA ----------------

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70

# ---------------- DATABASE ----------------

storage:
  storageClassName: sales-storageclass

  rabbitmq:
    stsName: rabbitmq
    volumeName: rabbitmq-pvc
    replicaCount: 1
    storageSize: 5Gi
    accessModes: ReadWriteMany
    vctName: rabbitmq-data
    image:
      repository: rabbitmq
      tag: 3-management
  

# ---------------- GATEWAY ----------------

gateway:
  gatewayName: sales-gateway
  namespace: {{ .Values.namespaces.gateway }}
  gatewayClassName: kgateway
  listeners:
    port: 80
  enabled: true
  port: 80

# ---------------- ROUTES ----------------

routes:
  auth:
    path: /api/v1/auth
    service: auth-service

  customers:
    path: /api/v1/customers
    service: customer-service

  orders:
    path: /api/v1/orders
    service: order-service

  invoices:
    path: /api/v1/invoices
    service: invoice-service

  payments:
    path: /api/v1/payments
    service: payment-service

  notifications:
    path: /api/v1/notifications
    service: notification-service

  ui:
    path: /
    service: sales-ui-service