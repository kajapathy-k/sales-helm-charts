global:
  environment: dev
  imagePullPolicy: IfNotPresent

namespaces:
  application: sales-test-ns
  gateway: sales-gateway-ns

# ---------------- SERVICES ----------------

auth:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/auth-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

customer:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/customer-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

order:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/order-service
    tag: v1.2.1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

invoice:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/invoice-service
    tag: v1.1.0
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

payment:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/payment-service
    tag: v1.1.0
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

notifications:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/sales-notification-service
    tag: v1.0.1

salesUi:
  replicaCount: 2
  port: 3000
  image:
    repository: kubectlandchill/sales-invoice-ui
    tag: v1.1.4
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "250m"
      memory: "720Mi"

# ---------------- HPA ----------------

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70

# ---------------- DATABASE ----------------

database:
  enabled: true
  image:
    repository: mysql
    tag: "8.4"
  storage:
    size: 2Gi

# ---------------- GATEWAY ----------------

gateway:
  enabled: true
  port: 80

# ---------------- ROUTES ----------------

routes:
  auth:
    path: /api/auth
    service: auth-service

  customers:
    path: /api/customers
    service: customer-service

  orders:
    path: /api/orders
    service: order-service

  invoices:
    path: /api/invoices
    service: invoice-service

  payments:
    path: /api/payments
    service: payment-service

  ui:
    path: /
    service: sales-ui-service